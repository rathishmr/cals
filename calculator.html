<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Universal Calculator</title>

<style>
body{
    font-family: Arial;
    display:flex;
    justify-content:center;
    margin-top:50px;
}

#calculator{
    border:1px solid #ccc;
    padding:20px;
    border-radius:8px;
    width:300px;
    background:#f9f9f9;
}

#display{
    width:100%;
    height:45px;
    text-align:right;
    font-size:24px;
    margin-bottom:10px;
}

.row{
    display:flex;
    justify-content:space-between;
}

.btn{
    width:65px;
    height:45px;
    font-size:16px;
    margin:3px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="calculator">

<input type="text" id="display" readonly>

<!-- Scientific Functions -->
<div class="row">
<button class="btn" id="square">x²</button>
<button class="btn" id="sqrt">√</button>
<button class="btn" id="sin">sin</button>
<button class="btn" id="log">log</button>
</div>

<div class="row">
<button class="btn" id="7">7</button>
<button class="btn" id="8">8</button>
<button class="btn" id="9">9</button>
<button class="btn" id="/">/</button>
</div>

<div class="row">
<button class="btn" id="4">4</button>
<button class="btn" id="5">5</button>
<button class="btn" id="6">6</button>
<button class="btn" id="*">*</button>
</div>

<div class="row">
<button class="btn" id="1">1</button>
<button class="btn" id="2">2</button>
<button class="btn" id="3">3</button>
<button class="btn" id="-">-</button>
</div>

<div class="row">
<button class="btn" id="0">0</button>
<button class="btn" id=".">.</button>
<button class="btn" id="C">C</button>
<button class="btn" id="+">+</button>
</div>

<div class="row">
<button class="btn" id="fact">n!</button>
<button class="btn" id="=" style="width:200px">=</button>
</div>

</div>

<script>

const display = document.getElementById("display");

let expression = "";
let lastResult = false;

function updateDisplay(){
    display.value = expression;
}

function factorial(n){
    if(n < 0) return "Error";
    if(n === 0 || n === 1) return 1;

    let result = 1;
    for(let i=2;i<=n;i++){
        result *= i;
    }
    return result;
}

document.querySelectorAll(".btn").forEach(btn=>{

    btn.addEventListener("click",()=>{

        const value = btn.id;

        if(value==="C"){
            expression="";
            lastResult=false;
        }

        else if(value==="="){

            try{
                expression = eval(expression).toString();
                lastResult=true;
            }
            catch{
                expression="Error";
            }

        }

        else if(value==="square"){

            if(expression!==""){
                expression = Math.pow(parseFloat(expression),2).toString();
                lastResult=true;
            }

        }

        else if(value==="sqrt"){

            if(expression!==""){
                expression = Math.sqrt(parseFloat(expression)).toString();
                lastResult=true;
            }

        }

        else if(value==="sin"){

            if(expression!==""){
                expression = Math.sin(parseFloat(expression)*Math.PI/180).toString();
                lastResult=true;
            }

        }

        else if(value==="log"){

            if(expression!==""){
                expression = Math.log10(parseFloat(expression)).toString();
                lastResult=true;
            }

        }

        else if(value==="fact"){

            if(expression!==""){
                expression = factorial(parseInt(expression)).toString();
                lastResult=true;
            }

        }

        else{

            if(lastResult){
                expression="";
                lastResult=false;
            }

            expression += value;

        }

        updateDisplay();

    });

});

</script>

</body>
</html>
